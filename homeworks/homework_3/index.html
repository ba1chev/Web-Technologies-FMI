<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .registration-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 2.5rem 3rem;
            width: 100%;
            max-width: 520px;
        }

        .registration-card header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .registration-card header h1 {
            font-size: 1.75rem;
            color: #333;
            margin-bottom: 0.25rem;
        }

        .registration-card header p {
            color: #777;
            font-size: 0.9rem;
        }

        fieldset {
            border: none;
            margin-bottom: 1.5rem;
        }

        fieldset legend {
            font-weight: 600;
            font-size: 1rem;
            color: #444;
            margin-bottom: 0.75rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid #eee;
            width: 100%;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            color: #555;
            margin-bottom: 0.3rem;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 0.7rem 1rem;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 0.95rem;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }

        input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15);
        }

        input.invalid {
            border-color: #e74c3c;
            box-shadow: 0 0 0 3px rgba(231, 76, 60, 0.1);
        }

        .error {
            color: #e74c3c;
            font-size: 0.8rem;
            margin-top: 0.25rem;
            display: none;
        }

        .error.visible {
            display: block;
        }

        .row {
            display: flex;
            gap: 1rem;
        }

        .row .form-group {
            flex: 1;
        }

        #register-btn {
            width: 100%;
            padding: 0.85rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
            margin-top: 0.5rem;
        }

        #register-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        #register-btn:active {
            transform: translateY(0);
        }

        #register-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        #success {
            display: none;
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            border-radius: 8px;
            padding: 1rem;
            margin-top: 1.25rem;
            text-align: center;
            font-weight: 500;
            animation: fadeIn 0.3s ease;
        }

        #success.visible {
            display: block;
        }

        .general-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            border-radius: 8px;
            padding: 1rem;
            margin-top: 1.25rem;
            text-align: center;
            font-weight: 500;
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .general-error.visible {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .optional-badge {
            font-size: 0.75rem;
            color: #999;
            font-weight: 400;
            margin-left: 0.25rem;
        }
    </style>
</head>
<body>
    <main class="registration-card">
        <header>
            <h1>Създай акаунт</h1>
            <p>Попълнете формата за регистрация</p>
        </header>

        <form id="registration-form" novalidate>
            <fieldset>
                <legend>Лични данни</legend>

                <div class="form-group">
                    <label for="username">Потребителско име</label>
                    <input type="text" id="username" autocomplete="username" required>
                    <span class="error" id="username-error"></span>
                </div>

                <div class="row">
                    <div class="form-group">
                        <label for="name">Име</label>
                        <input type="text" id="name" autocomplete="given-name" required>
                        <span class="error" id="name-error"></span>
                    </div>
                    <div class="form-group">
                        <label for="family-name">Фамилия</label>
                        <input type="text" id="family-name" autocomplete="family-name" required>
                        <span class="error" id="family-name-error"></span>
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">Имейл</label>
                    <input type="email" id="email" autocomplete="email" required>
                    <span class="error" id="email-error"></span>
                </div>

                <div class="form-group">
                    <label for="password">Парола</label>
                    <input type="password" id="password" autocomplete="new-password" required>
                    <span class="error" id="password-error"></span>
                </div>
            </fieldset>

            <fieldset>
                <legend>Адрес <span class="optional-badge">(по избор)</span></legend>

                <div class="form-group">
                    <label for="street">Улица</label>
                    <input type="text" id="street" autocomplete="street-address">
                </div>

                <div class="row">
                    <div class="form-group">
                        <label for="city">Град</label>
                        <input type="text" id="city" autocomplete="address-level2">
                    </div>
                    <div class="form-group">
                        <label for="postal-code">Пощенски код</label>
                        <input type="text" id="postal-code" autocomplete="postal-code">
                        <span class="error" id="postal-code-error"></span>
                    </div>
                </div>
            </fieldset>

            <button type="submit" id="register-btn">Регистрация</button>
        </form>

        <div id="success"></div>
        <div class="general-error" id="general-error"></div>
    </main>

    <script src="app.js"></script>
</body>
</html>
