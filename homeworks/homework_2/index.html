<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Your Puppy</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="image-container">
            <img src="dog.png" alt="Golden Retriever">
        </div>

        <div class="form-container">
            <h1>Yay, puppies! Register your puppy today!</h1>

            <form>
                <label for="name">Name</label>
                <input type="text" id="name" placeholder="Pet's name">

                <label for="photo" class="upload-btn">Upload Photo</label>
                <input type="file" id="photo" accept="image/*" hidden>

                <label for="breed">Breed</label>
                <select id="breed">
                    <option value="" disabled selected>Choose a breed</option>
                    <option value="golden-retriever">Golden Retriever</option>
                    <option value="labrador">Labrador</option>
                    <option value="german-shepherd">German Shepherd</option>
                    <option value="bulldog">Bulldog</option>
                    <option value="poodle">Poodle</option>
                    <option value="beagle">Beagle</option>
                    <option value="husky">Siberian Husky</option>
                </select>

                <label for="birthday">Birthday</label>
                <input type="date" id="birthday">

                <fieldset class="gender-group">
                    <legend>Gender</legend>
                    <label>
                        <input type="radio" name="gender" value="female" checked>
                        Female
                    </label>
                    <label>
                        <input type="radio" name="gender" value="male">
                        Male
                    </label>
                </fieldset>

                <label for="weight">Weight (lbs)</label>
                <input type="number" id="weight" min="0" placeholder="Enter weight">

                <div class="nav-buttons">
                    <button type="button" class="btn-back">Back</button>
                    <button type="button" class="btn-next">Next</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
